<!DOCTYPE html><html><head><meta name='viewport' content='width=device-width,initial-scale=1'><title>Robot Control</title><meta charset='UTF-8'><script src='https://cdn.jsdelivr.net/npm/chart.js'></script><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}.container{max-width:600px;margin:0 auto}h1{text-align:center;color:#fff;font-size:1.5em;margin-bottom:20px}.card{background:#fff;border-radius:20px;padding:20px;margin-bottom:20px;box-shadow:0 10px 30px rgba(0,0,0,0.2)}.distance-card{text-align:center;background:linear-gradient(135deg,#667eea,#764ba2)}.distance-value{font-size:80px;font-weight:bold;color:#fff;margin:10px 0}.status{font-size:20px;padding:12px;border-radius:12px;text-align:center;font-weight:bold;margin-top:15px}.status.auto{background:#2196F3;color:#fff}.status.manual{background:#FF9800;color:#fff}.mode-buttons{display:flex;gap:15px;justify-content:center;margin-bottom:20px}.mode-btn{background:#fff;color:#667eea;border:none;padding:12px 25px;border-radius:30px;font-size:18px;font-weight:bold;cursor:pointer}.mode-btn.active{background:#4CAF50;color:#fff}.control-panel{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;max-width:300px;margin:0 auto}.ctrl-btn{background:#667eea;color:#fff;border:none;padding:20px;border-radius:20px;font-size:24px;cursor:pointer}.ctrl-btn:active{background:#764ba2}.ctrl-stop{background:#f44336}.servo-buttons{display:flex;gap:10px;justify-content:center;margin-top:15px;flex-wrap:wrap}.servo-btn{background:#9C27B0;color:#fff;border:none;padding:10px 20px;border-radius:20px;font-size:14px;cursor:pointer}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;text-align:center;margin-top:15px}.stat-box{background:#f5f5f5;padding:10px;border-radius:12px}.stat-value{font-size:20px;font-weight:bold;color:#667eea}.stat-label{font-size:11px;color:#666}.speed-bar{height:25px;background:#667eea;border-radius:12px;margin-top:10px;transition:width 0.3s;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px}.chart-container{margin-top:15px}canvas{max-height:180px;width:100%} .ip-input-box { display: flex; gap: 10px; margin-bottom: 20px; } .ip-input-box input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; } .ip-input-box button { background: #4CAF50; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; } </style></head><body><div class='container'><h1>🤖 Robot Controller</h1><div class='card' style='background: #ffebee; border-left: 5px solid #f44336;'><div class='ip-input-box'><input type='text' id='robotIP' placeholder='Enter Robot IP (e.g. 192.168.43.150)'><button onclick='connectToRobot()'>Connect</button></div></div><div class='card distance-card'><div class='distance-value' id='distance'>-- cm</div><div id='status' class='status auto'>AUTO MODE</div></div><div class='mode-buttons'><button class='mode-btn' id='autoBtn' onclick='setMode("auto")'>🤖 AUTO</button><button class='mode-btn' id='manualBtn' onclick='setMode("manual")'>🎮 MANUAL</button></div><div class='card' id='manualControls'><div class='control-panel'><button class='ctrl-btn' onclick='sendCmd("forward")'>⬆️</button><button class='ctrl-btn' onclick='sendCmd("left")'>⬅️</button><button class='ctrl-btn' onclick='sendCmd("stop")'>🛑</button><button class='ctrl-btn' onclick='sendCmd("right")'>➡️</button><button class='ctrl-btn' onclick='sendCmd("backward")'>⬇️</button></div></div><div class='card'><div class='servo-buttons'><button class='servo-btn' onclick='sendCmd("servo_left")'>⬅️ Look Left</button><button class='servo-btn' onclick='sendCmd("servo_center")'>🎯 Center</button><button class='servo-btn' onclick='sendCmd("servo_right")'>➡️ Look Right</button><button class='servo-btn' onclick='sendCmd("servo_wave")'>👋 Wave</button></div></div><div class='card'><div class='stats'><div class='stat-box'><div class='stat-value' id='maxDist'>--</div><div class='stat-label'>📈 Max</div></div><div class='stat-box'><div class='stat-value' id='minDist'>--</div><div class='stat-label'>📉 Min</div></div><div class='stat-box'><div class='stat-value' id='avgDist'>--</div><div class='stat-label'>📊 Avg</div></div></div><div><div>⚡ Speed: <strong id='speed'>0</strong></div><div class='speed-bar' id='speedBar' style='width:0%'>0%</div><div>🎯 Action: <strong id='action'>STOP</strong></div></div></div><div class='card'><h2 style='text-align:center; color:#667eea; margin-bottom:15px; font-size:1.2em;'>📸 Robot Media</h2><img src='robo.jpeg' style='width:100%; border-radius:15px; margin-bottom:15px; box-shadow:0 5px 15px rgba(0,0,0,0.1);' alt='Robot'><video controls autoplay loop muted style='width:100%; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.1);'><source src='robo_video.mp4' type='video/mp4'></video></div><div class='card'><div class='chart-container'><canvas id='distChart'></canvas></div></div><div id='connStatus' style='text-align:center;font-size:14px;color:#f44336; font-weight:bold;'>🔴 Disconnected</div></div><script>let distData=[],timeLabels=[];let maxD=0,minD=200,sumD=0,count=0;const ctx=document.getElementById('distChart').getContext('2d');const chart=new Chart(ctx,{type:'line',data:{labels:timeLabels,datasets:[{label:'Distance (cm)',data:distData,borderColor:'#667eea',borderWidth:3,fill:true,tension:0.4}]},options:{responsive:true,scales:{y:{min:0,max:120}}}});let ws = null;function connectToRobot() { let ip = document.getElementById('robotIP').value; if(!ip) { alert('Please enter IP address first!'); return; } if(ws) { ws.close(); } document.getElementById('connStatus').innerHTML='🟡 Connecting...'; document.getElementById('connStatus').style.color='#FF9800'; ws = new WebSocket('ws://' + ip + ':81'); ws.onmessage=function(e){try{let d=JSON.parse(e.data);document.getElementById('distance').innerHTML=d.dist+' cm';document.getElementById('speed').innerHTML=d.speed;document.getElementById('action').innerHTML=d.action;let spdPercent=(d.speed/255)*100;document.getElementById('speedBar').style.width=spdPercent+'%';document.getElementById('speedBar').innerHTML=Math.round(spdPercent)+'%';let sDiv=document.getElementById('status');if(d.mode=='AUTO'){sDiv.className='status auto';sDiv.innerHTML='🤖 AUTO MODE - Following'}else{sDiv.className='status manual';sDiv.innerHTML='🎮 MANUAL MODE - You Control'}let dist=d.dist;sumD+=dist;count++;if(dist>maxD)maxD=dist;if(dist<minD)minD=dist;document.getElementById('maxDist').innerHTML=Math.round(maxD);document.getElementById('minDist').innerHTML=Math.round(minD);document.getElementById('avgDist').innerHTML=(sumD/count).toFixed(1);distData.push(dist);timeLabels.push(distData.length);if(distData.length>30){distData.shift();timeLabels.shift()}chart.update();if(d.mode=='AUTO'){document.getElementById('autoBtn').classList.add('active');document.getElementById('manualBtn').classList.remove('active');}else{document.getElementById('manualBtn').classList.add('active');document.getElementById('autoBtn').classList.remove('active');}}catch(e){}}; ws.onopen=function(){document.getElementById('connStatus').innerHTML='🟢 Connected to Robot'; document.getElementById('connStatus').style.color='#4CAF50';}; ws.onclose=function(){document.getElementById('connStatus').innerHTML='🔴 Disconnected'; document.getElementById('connStatus').style.color='#f44336';}; } function setMode(m){sendCmd(m)} function sendCmd(c){if(ws && ws.readyState===WebSocket.OPEN) ws.send(c); else alert('Not connected to robot! Enter IP and connect first.');}</script></body></html>
